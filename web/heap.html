<!DOCTYPE html>
<html>
<head>
    <title>Live Heap Visualizer</title>
    <style>
        body { font-family: Arial; background:#111; color:white; }
        h1 { text-align:center; }

        #heap {
            display:flex;
            width:90%;
            margin:auto;
            border:2px solid #444;
            height:120px;
        }

        .block {
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:12px;
            transition: all 0.5s ease;
        }

        .free { background:#2ecc71; }
        .used { background:#e74c3c; }
    </style>
</head>
<body>

<h1>Live Heap Visualizer</h1>
<div id="heap"></div>

<script src="heap.js"></script>

</body>
</html>
